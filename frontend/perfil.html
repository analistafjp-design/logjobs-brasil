<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Meu Perfil — LogJobs Brasil</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%9A%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="css/style.css">
<script>
  (function () {
    var tema = localStorage.getItem('logjobs-tema');
    if (tema === 'dark' || tema === 'light') {
      document.documentElement.setAttribute('data-theme', tema);
    }
  })();
</script>
</head>
<body>

<header class="navbar" id="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="logo">🚚 <span>LogJobs Brasil</span></a>
    <nav class="nav-links" id="navLinks">
      <a href="index.html#vagas">Vagas</a>
      <a href="dashboard.html">Dashboard</a>
      <button class="btn-tema" id="btnTema" aria-label="Alternar tema claro/escuro">🌙</button>
      <span id="areaConta"></span>
    </nav>
    <button class="nav-toggle" id="navToggle" aria-label="Abrir menu" aria-expanded="false" aria-controls="navLinks">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<main class="perfil-main">
  <div class="perfil-container">

    <div id="perfilBloqueado" class="perfil-card" hidden>
      <h1>Você precisa entrar</h1>
      <p class="modal-subtitulo">Faça login para ver e editar seu perfil.</p>
      <button class="btn-candidatar" id="btnEntrarPerfil">Entrar</button>
    </div>

    <div id="perfilConteudo" hidden>
      <h1 id="perfilTitulo">Meu perfil</h1>

      <section class="perfil-card">
        <h2>Dados da conta</h2>
        <form id="formPerfil">
          <label>Nome
            <input type="text" name="nome" required>
          </label>
          <label>E-mail
            <input type="email" name="email" disabled>
          </label>
          <label>Telefone
            <input type="tel" name="telefone" placeholder="(11) 99999-9999">
          </label>
          <label>Cidade
            <input type="text" name="cidade" placeholder="Sua cidade">
          </label>
          <label id="labelResumo">Mini-currículo
            <textarea name="resumo" rows="4" placeholder="Conte um pouco sobre sua experiência..."></textarea>
          </label>
          <p class="modal-erro" id="perfilErro" hidden></p>
          <p class="perfil-sucesso" id="perfilSucesso" hidden>✅ Perfil atualizado!</p>
          <button type="submit" class="modal-enviar">Salvar alterações</button>
        </form>
      </section>

      <section class="perfil-card">
        <h2>Vagas salvas</h2>
        <div id="perfilFavoritos"><p class="vagas-carregando">Carregando...</p></div>
      </section>
    </div>

  </div>
</main>

<div class="modal-overlay" id="modalOverlay" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <button class="modal-fechar" id="modalFechar" aria-label="Fechar">&times;</button>
    <div id="modalConteudo"></div>
  </div>
</div>

<div class="toast" id="toast" hidden></div>

<script src="js/app.js"></script>
<script src="js/perfil.js"></script>
</body>
</html>
